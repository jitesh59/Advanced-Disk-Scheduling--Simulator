<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disk Scheduling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💾 Disk Scheduling Simulator</h1>
        
        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <label>Disk Requests (comma-separated):</label>
                <input type="text" id="requests" value="98,183,37,122,14,124,65,67" placeholder="e.g., 98,183,37,122">
            </div>
            <div class="input-group">
                <label>Head Position:</label>
                <input type="number" id="head" value="53" min="0" max="199">
            </div>
            <div class="input-group">
                <label>Algorithm:</label>
                <select id="algorithm">
                    <option value="fcfs">FCFS</option>
                    <option value="sstf">SSTF</option>
                    <option value="scan">SCAN</option>
                    <option value="cscan">C-SCAN</option>
                </select>
            </div>
            <button onclick="runSimulation()">Simulate</button>
            <button onclick="compareAll()">Compare All</button>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div class="metrics">
                <h3>📊 Performance Metrics</h3>
                <table id="metrics-table">
                    <thead>
                        <tr><th>Metric</th><th>Value</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>Total Seek Time</td><td id="total-seek">-</td></tr>
                        <tr><td>Avg Seek Time</td><td id="avg-seek">-</td></tr>
                        <tr><td>Throughput</td><td id="throughput">-</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="visualization">
                <canvas id="diskCanvas" width="400" height="400"></canvas>
                <div id="sequence" class="sequence"></div>
            </div>
        </div>

        <div id="comparison" class="comparison hidden">
            <h3>🏆 Algorithm Comparison</h3>
            <canvas id="compareChart" width="600" height="300"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
